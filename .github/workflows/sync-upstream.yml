name: Sync upstream

on:
  schedule:
    # Daily at 06:17 UTC — staggered to avoid the top-of-hour cron rush.
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: sync-upstream
  cancel-in-progress: false

jobs:
  check-and-bump:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Detect upstream version drift
        id: drift
        run: |
          set -euo pipefail
          latest="$(./scripts/refresh-upstream.sh)" || exit 1
          if [[ -z "${latest}" ]]; then
            echo "Already pinned to latest — no PR needed."
            echo "needs_bump=false" >> "$GITHUB_OUTPUT"
          else
            current="$(awk '/^\[tool\.edge-python-sdk\]/{s=1;next} /^\[/{s=0} s && /^upstream-version[[:space:]]*=/{gsub(/.*=[[:space:]]*"|"[[:space:]]*$/, ""); print; exit}' pyproject.toml)"
            {
              echo "needs_bump=true"
              echo "from_version=${current}"
              echo "to_version=${latest}"
            } >> "$GITHUB_OUTPUT"
            echo "Will attempt bump: ${current} -> ${latest}"
          fi

      - name: Check if PR already exists for this bump
        if: steps.drift.outputs.needs_bump == 'true'
        id: existing
        env:
          GH_TOKEN: ${{ github.token }}
          # Via env, NEVER interpolated into the script body. `to_version` originates
          # OUTSIDE this repo — scripts/refresh-upstream.sh reads it from the upstream
          # release feed — so a version string carrying shell metacharacters would be
          # executed by the runner if it were pasted into the `run:` text (CWE-78).
          # `${{ }}` substitution happens before bash ever sees the script; `${VAR}`
          # expansion happens inside bash, where the value stays a value.
          TO_VERSION: ${{ steps.drift.outputs.to_version }}
        run: |
          set -euo pipefail
          branch="sync/upstream-${TO_VERSION}"
          echo "branch=${branch}" >> "$GITHUB_OUTPUT"
          if gh pr list --state open --head "${branch}" --json number | grep -q '"number"'; then
            echo "PR for ${branch} already open — skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          elif git ls-remote --exit-code --heads origin "${branch}" >/dev/null 2>&1; then
            # ORPHAN BRANCH: the ref exists but no PR is open for it. Every later step
            # ends in `git push origin "${branch}"`, which will be rejected non-fast-
            # forward, so this run is already doomed — it just used to die 4 steps later
            # with a bare "! [rejected] ... (fetch first)" that named no cause.
            #
            # This is the state the repo has been stuck in since 2026-07-03: five orphan
            # branches (3.1.0, 3.1.1, 3.2.0, 3.2.1, 3.3.0), ZERO PRs ever created for any
            # of them, and 20+ consecutive red runs. They are orphans because `gh pr
            # create` is blocked org-wide, so the push landed and the PR call failed.
            #
            # Deliberately NOT auto-deleting or force-pushing: those branches may hold the
            # only copy of a bump someone still wants, and this workflow has no mandate to
            # destroy refs. Fail with the cause and the exact remedy instead.
            echo "::error title=Orphan sync branch blocks this run::${branch} already exists on origin but has no open PR. This run cannot push and will fail. Cause is almost certainly that 'Allow GitHub Actions to create and approve pull requests' is disabled for this org, so a previous run pushed the branch and then could not open the PR."
            echo "::error::Remedy — open the PR by hand for the existing branch:  gh pr create --head ${branch} --title 'sync: bump upstream to ${TO_VERSION}' --fill"
            echo "::error::Or, if the branch is stale and unwanted:  git push origin --delete ${branch}"
            echo "::error::Tracking: see the repo issue 'upstream sync has been dead since 2026-07-03'."
            exit 1
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump pin in pyproject.toml
        if: steps.drift.outputs.needs_bump == 'true' && steps.existing.outputs.skip != 'true'
        env:
          FROM: ${{ steps.drift.outputs.from_version }}
          TO: ${{ steps.drift.outputs.to_version }}
        run: |
          set -euo pipefail
          python3 - <<EOF
          from pathlib import Path
          p = Path("pyproject.toml")
          text = p.read_text()
          text = text.replace(
              'upstream-version = "${FROM}"',
              'upstream-version = "${TO}"',
              1,
          )
          text = text.replace(
              '"latitudesh-python-sdk==${FROM}"',
              '"latitudesh-python-sdk==${TO}"',
              1,
          )
          p.write_text(text)
          EOF
          grep -E 'upstream-version|latitudesh-python-sdk==' pyproject.toml

      - name: Try applying patches against new upstream
        if: steps.drift.outputs.needs_bump == 'true' && steps.existing.outputs.skip != 'true'
        id: patch_attempt
        run: |
          set +e
          rm -rf .upstream-cache src/edge_python_sdk/_generated
          ./scripts/apply-patches.sh 2>&1 | tee patch-log.txt
          # ${PIPESTATUS[0]}, NOT $?. After a pipeline, `$?` is the exit status of the
          # LAST command — `tee` — which succeeds essentially always. This step recorded
          # exit_code=0 unconditionally, so the `!= '0'` branch below could never run.
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Run tests if patches applied
        if: |
          steps.drift.outputs.needs_bump == 'true'
          && steps.existing.outputs.skip != 'true'
          && steps.patch_attempt.outputs.exit_code == '0'
        id: tests
        run: |
          set +e
          # `uv sync` gets its own status. Capturing only the pytest pipeline would leave
          # a second silently-discarded exit code in the very step that exists to stop
          # silently discarding exit codes: a failed sync means the environment is broken,
          # and a pytest run against a broken environment proves nothing about upstream.
          uv sync --all-extras
          sync_rc=$?
          uv run pytest -q 2>&1 | tee test-log.txt
          # ${PIPESTATUS[0]}, NOT $? — see the identical note in the patch step above.
          # PROVEN on run 29561935235 (2026-07-17): pytest died at collection with
          # `ModuleNotFoundError: No module named 'edge_python_sdk._generated'`
          # ("1 error in 0.13s"), this step still concluded `success`, and the workflow
          # took the CLEAN-BUMP path — whose PR body states "Full test suite passed
          # locally in CI". Both failure paths were `skipped`.
          pytest_rc=${PIPESTATUS[0]}
          # Either failure disqualifies the clean-bump path. Report the sync failure in
          # preference, since a broken environment explains a pytest result but not the
          # other way round.
          if [ "$sync_rc" -ne 0 ]; then
            echo "uv sync FAILED (rc=$sync_rc) — environment is broken; pytest result is not meaningful."
            echo "exit_code=$sync_rc" >> "$GITHUB_OUTPUT"
          else
            echo "exit_code=$pytest_rc" >> "$GITHUB_OUTPUT"
          fi

      - name: Open clean-bump PR
        if: |
          steps.drift.outputs.needs_bump == 'true'
          && steps.existing.outputs.skip != 'true'
          && steps.patch_attempt.outputs.exit_code == '0'
          && steps.tests.outputs.exit_code == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          FROM: ${{ steps.drift.outputs.from_version }}
          TO: ${{ steps.drift.outputs.to_version }}
          BRANCH: ${{ steps.existing.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add pyproject.toml
          git commit -m "sync: bump upstream to ${TO}"
          git push origin "${BRANCH}"
          gh pr create \
            --title "sync: bump upstream to ${TO}" \
            --body "Auto-detected newer upstream release.

          - Upstream: latitudesh-python-sdk ${FROM} → ${TO}
          - All 3 patches applied cleanly.
          - Full test suite passed locally in CI.

          Merge if green." \
            --head "${BRANCH}"

      - name: Open rebase-needed PR (patches conflict)
        if: |
          steps.drift.outputs.needs_bump == 'true'
          && steps.existing.outputs.skip != 'true'
          && steps.patch_attempt.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          FROM: ${{ steps.drift.outputs.from_version }}
          TO: ${{ steps.drift.outputs.to_version }}
          BRANCH: ${{ steps.existing.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add pyproject.toml
          git commit -m "sync: bump upstream to ${TO} (patches need manual rebase)"
          git push origin "${BRANCH}"

          # Embed the failure log so a maintainer can see what conflicted
          # without round-tripping to the CI logs.
          {
            echo "Auto-detected newer upstream release, but **patches no longer apply cleanly**."
            echo ""
            echo "- Upstream: latitudesh-python-sdk ${FROM} → ${TO}"
            echo "- Action: re-generate patches against the new sdist and update \`patches/\`."
            echo ""
            echo "## apply-patches.sh log"
            echo ""
            echo '```'
            tail -c 32000 patch-log.txt
            echo '```'
          } > pr-body.md
          gh pr create \
            --title "sync: bump upstream to ${TO} — patches need rebase" \
            --body-file pr-body.md \
            --head "${BRANCH}" \
            --label "needs-rebase"

      - name: Open tests-failing PR (patches applied, tests broke)
        if: |
          steps.drift.outputs.needs_bump == 'true'
          && steps.existing.outputs.skip != 'true'
          && steps.patch_attempt.outputs.exit_code == '0'
          && steps.tests.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          FROM: ${{ steps.drift.outputs.from_version }}
          TO: ${{ steps.drift.outputs.to_version }}
          BRANCH: ${{ steps.existing.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "${BRANCH}"
          git add pyproject.toml
          git commit -m "sync: bump upstream to ${TO} (test failures — needs investigation)"
          git push origin "${BRANCH}"
          {
            echo "Auto-detected newer upstream release. Patches still apply cleanly, but **tests fail**."
            echo ""
            echo "- Upstream: latitudesh-python-sdk ${FROM} → ${TO}"
            echo "- Likely cause: upstream changed a response shape, request path, or model field name."
            echo ""
            echo "## pytest log"
            echo ""
            echo '```'
            tail -c 32000 test-log.txt
            echo '```'
          } > pr-body.md
          gh pr create \
            --title "sync: bump upstream to ${TO} — test failures" \
            --body-file pr-body.md \
            --head "${BRANCH}" \
            --label "needs-investigation"
