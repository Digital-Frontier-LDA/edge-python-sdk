name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      # `patch` and `tar` are part of the ubuntu-latest base image — no apt
      # install needed. The script will download the upstream sdist from PyPI.
      - name: Apply upstream patches
        run: ./scripts/apply-patches.sh

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run mypy src

      # EDGE_PROVIDER_INTEGRATION is unset → integration tests skip cleanly.
      - name: Tests
        run: uv run pytest -q

  build:
    # Verify the wheel + sdist build on at least one matrix slot so we catch
    # packaging regressions before a release tag is cut.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      - name: Apply upstream patches
        run: ./scripts/apply-patches.sh

      # Same two-step rationale as release.yml — see comments there.
      - name: Build sdist
        run: uv build --sdist

      - name: Build wheel
        run: uv build --wheel

      - name: List artifacts
        run: ls -la dist/

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  secrets-gitleaks:
    name: Secrets — Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      GITLEAKS_VERSION: "8.30.1"
    steps:
      # fetch-depth: 0 so gitleaks scans every commit on the branch, not just
      # the tip — secrets that were briefly committed and then removed still
      # live in history and remain harvestable.
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Install pinned binary with checksum verification instead of a
      # third-party marketplace action — fewer trust dependencies and the
      # version is locked.
      - name: Install gitleaks
        run: |
          set -euo pipefail
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${TARBALL}" -o "${TARBALL}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_checksums.txt" -o checksums.txt
          grep "${TARBALL}" checksums.txt | sha256sum -c -
          tar xzf "${TARBALL}" gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan
        run: gitleaks detect --source . --redact --verbose
