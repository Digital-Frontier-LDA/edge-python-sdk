name: Release

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "pyproject.toml"

      # Guard against a mismatch between the release tag (e.g. v0.2.0) and
      # the version declared in pyproject.toml. Without this, a forgotten
      # version bump would publish under the wrong number and burn the
      # release slot on PyPI.
      #
      # We compare via `packaging.version.Version` rather than string equality
      # so the human-friendly tag `v0.1.0-alpha.1` matches the PEP 440 form
      # `0.1.0a1` that pyproject.toml must use.
      - name: Verify tag matches pyproject version
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF#refs/tags/v}"
          pyproject_version="$(awk -F\" '/^version[[:space:]]*=/ {print $2; exit}' pyproject.toml)"
          uv run --with packaging python - <<EOF
          from packaging.version import Version
          tag = Version("${tag_version}")
          pyproject = Version("${pyproject_version}")
          if tag != pyproject:
              raise SystemExit(
                  f"::error::Release tag v{tag} does not match pyproject.toml version {pyproject}"
              )
          print(f"Tag v{tag} matches pyproject.toml version {pyproject}")
          EOF

      - name: Apply upstream patches
        run: ./scripts/apply-patches.sh

      # Build sdist and wheel as separate hatch invocations. `uv build`
      # without flags builds sdist first and then derives the wheel *from*
      # the sdist — but our sdist excludes `_generated/` (it ships the
      # recipe, not the result), which would yield a wheel missing 278
      # files. Building each from source independently fixes that.
      - name: Build sdist (recipe — patches + scripts + sources)
        run: uv build --sdist

      - name: Build wheel (fully-patched, ready to import)
        run: uv build --wheel

      - name: Inspect artifacts
        run: |
          set -euo pipefail
          ls -la dist/
          # Sanity-check the wheel actually includes the patched _generated/ tree.
          generated_count="$(unzip -l dist/*.whl | grep -c 'edge_python_sdk/_generated/' || true)"
          if [[ "${generated_count}" -lt 100 ]]; then
            echo "::error::Wheel only contains ${generated_count} _generated/ files — expected ≥100"
            exit 1
          fi
          echo "Wheel contains ${generated_count} _generated/ files."

      - name: Validate distribution metadata
        run: uv tool run twine check dist/*

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 30

  publish-testpypi:
    # Pre-release tags (e.g. v0.1.0-alpha.1) — dry-run to TestPyPI. Lets us
    # validate the full pipeline + the published metadata before burning a
    # release slot on real PyPI.
    if: github.event.release.prerelease == true
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: testpypi
      url: https://test.pypi.org/project/edge-python-sdk/
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    # Full releases (e.g. v0.1.0) — publish to the real index.
    if: github.event.release.prerelease == false
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: pypi
      url: https://pypi.org/project/edge-python-sdk/
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI (OIDC trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
